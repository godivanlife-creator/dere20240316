<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>得意 Dere — GodiVanLife Pokédex</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated;}
:root{
  --dex-red:#cc2200;
  --dex-red2:#ee3311;
  --dex-red3:#ff5533;
  --dex-dark:#1a0800;
  --dex-hinge:#333;
  --screen-bg:#9bbc0f;
  --screen-dark:#0f380f;
  --screen-mid:#306230;
  --screen-light:#8bac0f;
  --screen-white:#9bbc0f;
  --inner-bg:#8fb0a0;
  --btn-blue:#2244cc;
  --btn-yellow:#ddaa00;
  --pixel:3px;
  --black:#000;
  --white:#eee;
}

html,body{
height:100%;
background:#111;
display:flex;
justify-content:center;
align-items:flex-start;
font-family:‘Press Start 2P’,monospace;
overflow-x:hidden;
}

/* ════════════════════════
圖鑑機外殼
════════════════════════ */
.pokedex{
width:100%;
max-width:420px;
min-height:100vh;
background:var(–dex-red);
position:relative;
display:flex;
flex-direction:column;
box-shadow:
inset -4px 0 0 var(–dex-dark),
inset 4px 0 0 rgba(255,255,255,.12),
inset 0 4px 0 rgba(255,255,255,.12),
6px 6px 0 var(–dex-dark);
}

/* 上殼反光 */
.pokedex::before{
content:’’;
position:absolute;top:0;left:0;right:0;
height:50%;
background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);
pointer-events:none;z-index:10;
}

/* 折頁紋 */
.hinge{
height:12px;
background:repeating-linear-gradient(
90deg,
var(–dex-dark) 0px,var(–dex-dark) 4px,
var(–dex-red) 4px,var(–dex-red) 8px
);
border-top:3px solid var(–dex-dark);
border-bottom:3px solid var(–dex-dark);
}

/* ════════════════════════
頂部燈飾區
════════════════════════ */
.dex-top{
padding:16px 16px 10px;
display:flex;
align-items:center;
gap:12px;
border-bottom:4px solid var(–dex-dark);
background:var(–dex-red2);
}

/* 大藍燈 */
.big-light{
width:44px;height:44px;
border-radius:50%;
background:radial-gradient(circle at 35% 35%,#88ccff,#2244aa);
border:4px solid var(–dex-dark);
box-shadow:
inset -2px -2px 0 rgba(0,0,0,.4),
inset 2px 2px 0 rgba(255,255,255,.3),
0 0 12px rgba(100,180,255,.6);
animation:bigLightPulse 2s ease-in-out infinite alternate;
flex-shrink:0;
}
@keyframes bigLightPulse{
from{box-shadow:inset -2px -2px 0 rgba(0,0,0,.4),inset 2px 2px 0 rgba(255,255,255,.3),0 0 8px rgba(100,180,255,.4);}
to{box-shadow:inset -2px -2px 0 rgba(0,0,0,.4),inset 2px 2px 0 rgba(255,255,255,.3),0 0 24px rgba(100,180,255,.9);}
}

/* 小燈排 */
.small-lights{display:flex;gap:6px;align-items:center;}
.sml{width:12px;height:12px;border-radius:50%;border:2px solid var(–dex-dark);}
.sml-r{background:#ff3333;box-shadow:0 0 6px #ff3333;}
.sml-y{background:#ffdd00;box-shadow:0 0 6px #ffdd00;}
.sml-g{background:#33ff66;box-shadow:0 0 6px #33ff66;animation:greenBlink 1.5s step-end infinite;}
@keyframes greenBlink{0%,100%{opacity:1;}50%{opacity:.3;}}

.dex-top-title{
font-size:.45rem;color:rgba(255,255,255,.7);
letter-spacing:.08em;margin-left:auto;
}

/* ════════════════════════
語言切換（圖鑑風按鈕）
════════════════════════ */
.lang-row{
display:flex;gap:4px;padding:8px 16px;
background:var(–dex-red);
border-bottom:3px solid var(–dex-dark);
}
.lang-btn{
flex:1;padding:6px 4px;
background:var(–dex-dark);border:3px solid var(–dex-dark);
color:rgba(255,255,255,.5);
font-family:‘Press Start 2P’,monospace;font-size:.4rem;
cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.5);
transition:none;
}
.lang-btn.active{
background:var(–btn-yellow);color:var(–dex-dark);
border-color:var(–btn-yellow);
box-shadow:2px 2px 0 var(–dex-dark);
}
.lang-btn:hover:not(.active){background:#333;}

/* ════════════════════════
主螢幕（上）
════════════════════════ */
.main-screen-wrap{
padding:12px 16px 8px;
background:var(–dex-red2);
}
.main-screen{
background:var(–screen-dark);
border:6px solid var(–dex-dark);
box-shadow:
inset 3px 3px 0 rgba(0,0,0,.5),
inset -2px -2px 0 rgba(255,255,255,.05),
3px 3px 0 var(–dex-dark);
position:relative;overflow:hidden;
}
/* 螢幕掃描線 */
.main-screen::after{
content:’’;position:absolute;inset:0;pointer-events:none;
background:repeating-linear-gradient(
0deg,
transparent 0px,transparent 3px,
rgba(0,0,0,.15) 3px,rgba(0,0,0,.15) 4px
);z-index:5;
}
/* 螢幕反光 */
.main-screen::before{
content:’’;position:absolute;top:0;left:0;right:0;height:40%;
background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);
pointer-events:none;z-index:6;
}

/* 精靈展示區 */
.sprite-area{
display:flex;align-items:center;justify-content:space-between;
padding:16px 12px 8px;
position:relative;
}
.sprite-frame{
width:100px;height:100px;
background:var(–screen-bg);
border:4px solid var(–screen-mid);
display:flex;align-items:center;justify-content:center;
position:relative;overflow:hidden;
box-shadow:inset 2px 2px 0 rgba(0,0,0,.3);
}
.sprite-frame img{
width:100%;height:100%;object-fit:cover;
filter:contrast(1.1) saturate(1.2);
animation:spriteIdle 2s ease-in-out infinite alternate;
}
@keyframes spriteIdle{
from{transform:translateY(0);}
to{transform:translateY(-4px);}
}

/* 圖鑑號碼 + 名字 */
.dex-info-right{
flex:1;padding-left:12px;
display:flex;flex-direction:column;gap:6px;
}
.dex-number{font-size:.4rem;color:var(–screen-light);letter-spacing:.08em;}
.dex-name-main{font-size:.75rem;color:var(–screen-bg);line-height:1.4;}
.dex-name-sub{font-size:.38rem;color:var(–screen-light);}
.dex-types{display:flex;gap:4px;margin-top:2px;}
.dex-type{
padding:3px 7px;font-size:.35rem;
border:2px solid var(–screen-mid);
color:var(–screen-bg);background:var(–screen-mid);
}

/* HP 列 */
.hp-section{
padding:0 12px 12px;
}
.hp-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.hp-label-px{font-size:.4rem;color:var(–screen-light);width:20px;}
.hp-track{
flex:1;height:8px;
background:var(–screen-dark);
border:2px solid var(–screen-mid);
}
.hp-bar{
height:100%;
background:repeating-linear-gradient(
90deg,#4eff91 0px,#4eff91 5px,transparent 5px,transparent 7px
);
transition:width 1s steps(10);
}
.hp-bar.low{
background:repeating-linear-gradient(
90deg,#ff4444 0px,#ff4444 5px,transparent 5px,transparent 7px
);
}
.hp-num{font-size:.38rem;color:var(–screen-bg);}
.status-tag{
font-size:.35rem;padding:2px 6px;
border:2px solid #ff4444;color:#ff4444;
animation:statusBlink .8s step-end infinite;
display:inline-block;margin-top:2px;
}
@keyframes statusBlink{0%,100%{opacity:1;}50%{opacity:0;}}

/* 對話文字框 */
.dialog-area{
background:var(–screen-bg);
border-top:4px solid var(–screen-mid);
padding:10px 12px;
min-height:56px;position:relative;
}
.dialog-line{
font-size:.45rem;color:var(–screen-dark);
line-height:1.9;white-space:pre-wrap;
}
.dialog-cursor{
display:inline-block;width:8px;height:10px;
background:var(–screen-dark);
animation:blink .6s step-end infinite;
margin-left:2px;vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ════════════════════════
折頁區（中間轉軸）
════════════════════════ */
/* ════════════════════════
頁籤選擇器（圖鑑分頁）
════════════════════════ */
.tab-row{
display:grid;grid-template-columns:repeat(4,1fr);
gap:2px;padding:8px 12px 0;
background:var(–dex-red);
}
.dex-tab{
padding:8px 4px;
background:var(–dex-dark);
border:3px solid var(–dex-dark);
color:rgba(255,255,255,.4);
font-family:‘Press Start 2P’,monospace;font-size:.35rem;
cursor:pointer;text-align:center;line-height:1.6;
transition:none;
box-shadow:0 3px 0 rgba(0,0,0,.5);
}
.dex-tab.active{
background:var(–inner-bg);color:var(–screen-dark);
border-color:var(–dex-dark);
box-shadow:none;transform:translateY(3px);
}
.dex-tab:hover:not(.active){background:#2a0a00;}

/* ════════════════════════
下半面板
════════════════════════ */
.dex-lower{
flex:1;
background:var(–inner-bg);
border-top:4px solid var(–dex-dark);
padding:12px;
display:flex;flex-direction:column;gap:8px;
min-height:0;
}

/* 各頁內容 */
.dex-page{display:none;}
.dex-page.active{display:flex;flex-direction:column;gap:8px;}

/* ── DATA 頁 ── */
.data-screen{
background:var(–screen-dark);
border:4px solid var(–dex-dark);
box-shadow:inset 2px 2px 0 rgba(0,0,0,.4),3px 3px 0 var(–dex-dark);
padding:12px;
}
.data-screen::after{
content:’’;display:block;
}
.data-row{
display:flex;gap:6px;margin-bottom:6px;
border-bottom:1px solid var(–screen-mid);
padding-bottom:6px;
}
.data-row:last-child{border-bottom:none;margin-bottom:0;}
.data-key{font-size:.38rem;color:var(–screen-light);width:64px;flex-shrink:0;line-height:1.8;}
.data-val{font-size:.4rem;color:var(–screen-bg);line-height:1.8;flex:1;}
.data-val.noto{font-family:‘Noto Sans JP’,monospace;}

/* ── CHAT 頁 ── */
.chat-mode-row{
display:grid;grid-template-columns:1fr 1fr;gap:3px;
margin-bottom:6px;
}
.chat-mode-btn{
padding:8px;background:var(–dex-dark);
border:3px solid rgba(255,255,255,.1);
color:rgba(255,255,255,.4);
font-family:‘Press Start 2P’,monospace;font-size:.38rem;
cursor:pointer;text-align:center;line-height:1.6;
box-shadow:2px 2px 0 rgba(0,0,0,.4);
}
.chat-mode-btn.active{
background:var(–btn-yellow);color:var(–dex-dark);
border-color:var(–btn-yellow);
}
.chat-screen{
background:var(–screen-dark);
border:4px solid var(–dex-dark);
box-shadow:inset 2px 2px 0 rgba(0,0,0,.4),3px 3px 0 var(–dex-dark);
display:flex;flex-direction:column;
height:220px;
}
.chat-msgs{
flex:1;overflow-y:auto;padding:8px;
display:flex;flex-direction:column;gap:6px;
scroll-behavior:smooth;
}
.chat-msgs::-webkit-scrollbar{width:4px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(–screen-mid);}
.msg{display:flex;gap:5px;animation:msgPop .1s steps(2) both;}
@keyframes msgPop{from{opacity:0;}to{opacity:1;}}
.msg.user{flex-direction:row-reverse;}
.msg-ic{width:20px;height:20px;flex-shrink:0;border:2px solid var(–screen-mid);display:flex;align-items:center;justify-content:center;font-size:.6rem;align-self:flex-end;}
.msg.bot .msg-ic{background:var(–screen-mid);}
.msg.user .msg-ic{background:var(–btn-yellow);}
.msg-bub{max-width:80%;padding:5px 7px;border:2px solid var(–screen-mid);font-size:.38rem;line-height:1.8;}
.msg.bot .msg-bub{background:var(–screen-mid);color:var(–screen-bg);font-family:‘Noto Sans JP’,monospace;}
.msg.user .msg-bub{background:var(–btn-yellow);color:var(–dex-dark);font-family:‘Noto Sans JP’,monospace;}
.typing-bub{display:flex;gap:4px;padding:6px 8px;background:var(–screen-mid);border:2px solid var(–screen-mid);}
.tp{width:6px;height:6px;background:var(–screen-bg);animation:tp .8s step-end infinite;}
.tp:nth-child(2){animation-delay:.27s;}.tp:nth-child(3){animation-delay:.54s;}
@keyframes tp{0%,100%{opacity:1;}50%{opacity:0;}}
.quick-row{padding:5px 6px;border-top:3px solid var(–dex-dark);display:flex;gap:4px;overflow-x:auto;flex-wrap:nowrap;background:rgba(0,0,0,.3);}
.quick-row::-webkit-scrollbar{display:none;}
.qbtn{flex-shrink:0;padding:4px 7px;background:var(–screen-dark);border:2px solid var(–screen-mid);color:var(–screen-light);font-family:‘Press Start 2P’,monospace;font-size:.32rem;cursor:pointer;white-space:nowrap;}
.qbtn:hover{background:var(–screen-mid);}
.chat-input-row{display:flex;border-top:3px solid var(–dex-dark);}
.chat-inp{flex:1;padding:7px 8px;background:var(–screen-dark);border:none;outline:none;color:var(–screen-bg);font-family:‘Noto Sans JP’,monospace;font-size:.38rem;border-right:3px solid var(–dex-dark);}
.chat-inp::placeholder{color:rgba(155,188,15,.3);}
.chat-send{width:36px;background:var(–btn-yellow);border:none;cursor:pointer;color:var(–dex-dark);font-size:.8rem;font-family:‘Press Start 2P’,monospace;}
.chat-send:disabled{background:var(–screen-mid);cursor:not-allowed;}

/* ── DESTINY 頁 ── */
.destiny-screen{
background:var(–screen-dark);
border:4px solid var(–dex-dark);
box-shadow:inset 2px 2px 0 rgba(0,0,0,.4),3px 3px 0 var(–dex-dark);
padding:10px;
}
.dest-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:2px solid var(–screen-mid);padding-bottom:6px;}
.dest-label{font-size:.38rem;color:var(–btn-yellow);}
.dest-date{font-size:.32rem;color:var(–screen-light);}
.dest-emoji{font-size:1.8rem;text-align:center;display:block;margin:6px 0;filter:drop-shadow(0 0 6px rgba(155,188,15,.6));}
.dest-msg{font-size:.38rem;color:var(–screen-bg);line-height:1.9;font-family:‘Noto Sans JP’,monospace;margin-bottom:10px;}
.dest-bars{display:flex;flex-direction:column;gap:6px;}
.dest-bar-row{display:flex;align-items:center;gap:6px;}
.dest-bar-lbl{font-size:.32rem;color:var(–screen-light);width:50px;flex-shrink:0;}
.dest-bar-track{flex:1;height:7px;background:var(–dex-dark);border:2px solid var(–screen-mid);}
.dest-bar-fill{height:100%;background:repeating-linear-gradient(90deg,#4eff91 0,#4eff91 5px,transparent 5px,transparent 7px);width:0%;transition:width 1s steps(8);}

/* ── GPS 頁 ── */
.gps-screen{
background:var(–screen-dark);
border:4px solid var(–dex-dark);
box-shadow:inset 2px 2px 0 rgba(0,0,0,.4),3px 3px 0 var(–dex-dark);
padding:10px;display:flex;flex-direction:column;gap:8px;
}
.gps-radar{
width:80px;height:80px;border-radius:50%;
background:radial-gradient(circle,#003300,#001100);
border:4px solid #00aa00;
margin:0 auto;position:relative;
box-shadow:0 0 12px rgba(0,200,0,.3);
}
.radar-line{
position:absolute;top:50%;left:50%;
width:50%;height:2px;
background:linear-gradient(90deg,transparent,#00ff44);
transform-origin:left center;
animation:radarSpin 2s linear infinite;
}
@keyframes radarSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.radar-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:#00ff44;box-shadow:0 0 6px #00ff44;}
.radar-dot:nth-child(2){top:25%;left:60%;}
.radar-dot:nth-child(3){top:60%;left:25%;animation:blink .6s step-end infinite;}
.gps-text{font-size:.4rem;color:var(–screen-bg);line-height:1.9;font-family:‘Noto Sans JP’,monospace;text-align:center;}
.gps-btn{
width:100%;padding:10px;
background:#00aa00;border:4px solid var(–dex-dark);
color:#fff;font-family:‘Press Start 2P’,monospace;font-size:.42rem;
cursor:pointer;box-shadow:3px 3px 0 var(–dex-dark);
}
.gps-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(–dex-dark);}
.call-btn{
width:100%;padding:9px;
background:var(–dex-red2);border:4px solid var(–dex-dark);
color:#fff;font-family:‘Press Start 2P’,monospace;font-size:.42rem;
cursor:pointer;text-decoration:none;
display:flex;align-items:center;justify-content:center;
box-shadow:3px 3px 0 var(–dex-dark);
}
.ig-btn{
width:100%;padding:9px;
background:linear-gradient(135deg,#833ab4,#e1306c);
border:4px solid var(–dex-dark);
color:#fff;font-family:‘Press Start 2P’,monospace;font-size:.42rem;
cursor:pointer;text-decoration:none;
display:flex;align-items:center;justify-content:center;
box-shadow:3px 3px 0 var(–dex-dark);
}

/* ════════════════════════
方向鍵 + ABXY
════════════════════════ */
.controls{
padding:12px 16px;
background:var(–dex-red);
border-top:4px solid var(–dex-dark);
display:flex;justify-content:space-between;align-items:center;
}
.dpad{
width:80px;height:80px;
position:relative;flex-shrink:0;
}
.dpad-h,.dpad-v{
position:absolute;background:var(–dex-dark);border-radius:2px;
}
.dpad-h{width:100%;height:30%;top:35%;left:0;}
.dpad-v{height:100%;width:30%;left:35%;top:0;}
.dpad-center{
position:absolute;width:30%;height:30%;top:35%;left:35%;
background:#222;z-index:2;
}
.dpad-btn{
position:absolute;width:30%;height:30%;
display:flex;align-items:center;justify-content:center;
font-size:.6rem;cursor:pointer;z-index:3;color:rgba(255,255,255,.5);
font-family:‘Press Start 2P’,monospace;
}
.dpad-up{top:0;left:35%;}
.dpad-down{bottom:0;left:35%;}
.dpad-left{top:35%;left:0;}
.dpad-right{top:35%;right:0;}
.dpad-btn:active{background:rgba(255,255,255,.1);}

/* START/SELECT */
.mid-btns{display:flex;flex-direction:column;gap:6px;align-items:center;}
.sys-btn{
padding:5px 10px;background:var(–dex-dark);
border:2px solid rgba(255,255,255,.15);
color:rgba(255,255,255,.4);
font-family:‘Press Start 2P’,monospace;font-size:.32rem;
cursor:pointer;border-radius:99px;
box-shadow:1px 1px 0 rgba(0,0,0,.5);
}
.sys-btn:hover{background:#333;}
.vol-display{font-size:.32rem;color:rgba(255,255,255,.35);text-align:center;margin-top:4px;}

/* AB ボタン */
.ab-btns{
display:grid;grid-template-columns:1fr 1fr;
gap:6px;width:72px;
}
.ab-btn{
width:32px;height:32px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-family:‘Press Start 2P’,monospace;font-size:.45rem;
cursor:pointer;border:3px solid var(–dex-dark);
box-shadow:0 4px 0 var(–dex-dark),2px 2px 0 rgba(255,255,255,.1);
transition:none;color:#fff;font-weight:bold;
}
.ab-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(–dex-dark);}
.btn-a{background:#cc2200;grid-column:2;}
.btn-b{background:#1a44aa;grid-column:1;grid-row:1;}
.btn-x{background:#cc8800;grid-column:1;grid-row:2;}
.btn-y{background:#116611;grid-column:2;grid-row:2;}

/* ════════════════════════
音效靜音鍵
════════════════════════ */
#mute-btn{
position:fixed;bottom:16px;right:16px;z-index:500;
width:40px;height:40px;
background:var(–dex-dark);
border:3px solid var(–btn-yellow);
color:var(–btn-yellow);font-size:1rem;
cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.6);
display:flex;align-items:center;justify-content:center;
font-family:‘Press Start 2P’,monospace;
}

/* 掃描線全域 */
body::after{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:9999;
background:repeating-linear-gradient(
0deg,transparent 0,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px
);
}
</style>

</head>

function seedRandom(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}
function getTodaySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}

function initToday(){
  const rng=seedRandom(getTodaySeed());
  const t=UI[lang];
  todayDestiny=t.destinies[Math.floor(rng()*t.destinies.length)];
  todayBars=[Math.floor(rng()*50)+50,Math.floor(rng()*50)+50,Math.floor(rng()*50)+50,Math.floor(rng()*50)+50];
}

/* 打字機 */
function typeDialog(text){
  const el=document.getElementById('dialog-text');
  el.innerText='';
  const lines=text.split('\n');
  let li=0,i=0,chars=lines[0].split('');
  function next(){
    if(li>=lines.length)return;
    if(i<chars.length){el.innerText+=chars[i++];setTimeout(next,45);}
    else if(li<lines.length-1){el.innerText+='\n';li++;chars=lines[li].split('');i=0;setTimeout(next,120);}
  }
  next();
}

function switchTab(name, el){
  TABS.forEach((t,i)=>{
    document.getElementById('page-'+t).classList.toggle('active',t===name);
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
    if(t===name) currentTabIdx=i;
  });
}
function switchTabByName(name){
  const btn=document.getElementById('tab-'+name);

}
function dpadTab(dir){
  currentTabIdx=(currentTabIdx+dir+TABS.length)%TABS.length;
  switchTabByName(TABS[currentTabIdx]);
}

function clearChat(){document.getElementById('chat-msgs').innerHTML='';}
function addGreeting(){
  const t=UI[lang];

function addBotMsg(text){
  const el=document.getElementById('chat-msgs');
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML=`<div class="msg-ic">${mode==='pet'?'🐶':'👩‍⚕️'}</div><div class="msg-bub">${text.replace(/\n/g,'<br>')}</div>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function addUserMsg(text){
  const el=document.getElementById('chat-msgs');
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML=`<div class="msg-ic">🧑</div><div class="msg-bub">${text}</div>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function showTyping(){
  const el=document.getElementById('chat-msgs');
  const d=document.createElement('div');d.className='msg bot';d.id='typing-msg';
  d.innerHTML=`<div class="msg-ic">${mode==='pet'?'🐶':'👩‍⚕️'}</div><div class="typing-bub"><div class="tp"></div><div class="tp"></div><div class="tp"></div></div>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing-msg');if(t)t.remove();}
function renderQuick(){
  const t=UI[lang];
  const qs=t.quick[mode==='pet'?0:1];
  document.getElementById('quick-row').innerHTML=qs.map(q=>`<button class="qbtn" onclick="sendQuick('${q.replace(/'/g,"\\'")}')">${q}</button>`).join('');
}
function switchMode(m){
  mode=m;chatHistory=[];
  document.getElementById('cm-pet').classList.toggle('active',m==='pet');
  document.getElementById('cm-exp').classList.toggle('active',m==='expert');
  const t=UI[lang];
  document.getElementById('chat-inp').placeholder=t.inputPh[m==='pet'?0:1];
  clearChat();renderQuick();addGreeting();
}
function sendQuick(q){document.getElementById('chat-inp').value=q;sendMsg();}

async function sendMsg(){
  if(isThinking)return;
  const inp=document.getElementById('chat-inp');
  const text=inp.value.trim();if(!text)return;
  inp.value='';
  addUserMsg(text);chatHistory.push({role:'user',content:text});
  isThinking=true;document.getElementById('send-btn').disabled=true;
  showTyping();
  const info=`Name:${PET.nameZh}(${PET.nameEn}),Breed:${PET.breed_en},Personality:${PET.personality_en},Skill:${PET.special_en},Phone:${PET.phone}`;
  const sys=mode==='pet'
    ?`You are ${PET.nameZh}(${PET.nameEn}), a ${PET.breed_en}. Speak AS THE DOG in first person — playful, energetic, loves ball sports. Like a Pokémon speaking. Keep replies to 2-3 short sentences. Use dog sounds. Info:${info}. Reply in same language as user.`
    :`You are a GodiVanLife Pokédex AI for pets. Expert in ${PET.breed_en}. If lost pet emergency, guide to press Y or call ${PET.phone}. Info:${info}. Brief replies 3-4 sentences. Reply in same language as user.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:chatHistory.slice(-8)})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'...';
    removeTyping();addBotMsg(reply);chatHistory.push({role:'assistant',content:reply});
  }catch(e){
    removeTyping();
    addBotMsg({zh:'訊號中斷！請重試！',en:'Signal lost! Try again!',ja:'通信が切れた！もう一度！'}[lang]);
  }
  isThinking=false;document.getElementById('send-btn').disabled=false;
}

function sendGPS(){
  const btn=document.getElementById('gps-btn');
  const t=UI[lang];
  btn.innerText=t.gpsLoading;btn.disabled=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);
    const url=`https://maps.google.com/?q=${lat},${lng}`;
    const msg=encodeURIComponent(`🐶 發現${PET.nameZh}！位置：`+url);
    window.location.href=`sms:${PET.gps}?body=${msg}`;
    btn.disabled=false;btn.innerText=t.gpsBtn;
  },()=>{alert(t.gpsError);btn.disabled=false;btn.innerText=t.gpsBtn;},{enableHighAccuracy:true,timeout:8000,maximumAge:0});
}

let audioCtx=null, masterGain=null, isMuted=false, loopTimer=null, scheduledNodes=[];

function startMusic(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=0.5;
    masterGain.connect(audioCtx.destination);
    scheduleLoop();
  }catch(e){}
}
const NOTE={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,Bb3:233.08,Gb4:369.99,Ab4:415.30,Bb4:466.16,R:0};
const MELODY=[{n:'E4',d:.125},{n:'E4',d:.125},{n:'R',d:.125},{n:'E4',d:.125},{n:'R',d:.125},{n:'C4',d:.125},{n:'E4',d:.25},{n:'G4',d:.5},{n:'R',d:.25},{n:'G3',d:.25},{n:'C4',d:.375},{n:'R',d:.125},{n:'G3',d:.25},{n:'R',d:.25},{n:'E3',d:.375},{n:'R',d:.125},{n:'A3',d:.25},{n:'B3',d:.25},{n:'Bb3',d:.125},{n:'A3',d:.25},{n:'G3',d:.25},{n:'E4',d:.25},{n:'G4',d:.25},{n:'A4',d:.25},{n:'F4',d:.25},{n:'G4',d:.25},{n:'R',d:.125},{n:'E4',d:.25},{n:'C4',d:.125},{n:'D4',d:.125},{n:'B3',d:.5},{n:'R',d:.5}];
const BASS=[{n:'C3',d:.25},{n:'C3',d:.25},{n:'G3',d:.25},{n:'C3',d:.25},{n:'C3',d:.25},{n:'G3',d:.25},{n:'E3',d:.25},{n:'G3',d:.25},{n:'A3',d:.25},{n:'A3',d:.25},{n:'F3',d:.25},{n:'A3',d:.25},{n:'F3',d:.25},{n:'G3',d:.25},{n:'E3',d:.25},{n:'G3',d:.25},{n:'C3',d:.25},{n:'C3',d:.25},{n:'G3',d:.25},{n:'C3',d:.25},{n:'A3',d:.25},{n:'G3',d:.25},{n:'F3',d:.25},{n:'E3',d:.25},{n:'D3',d:.25},{n:'D3',d:.25},{n:'A3',d:.25},{n:'D3',d:.25},{n:'G3',d:.25},{n:'F3',d:.25},{n:'E3',d:.25},{n:'D3',d:.25}];
const DRUM=[1,0,0,0,1,0,1,0,1,0,0,0,1,0,1,1];

function makeOsc(freq,type,st,dur,vol){
  if(!freq||!audioCtx)return;
  const o=audioCtx.createOscillator();const g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,st);
  g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol,st+0.005);
  g.gain.setValueAtTime(vol,st+dur-0.04);g.gain.linearRampToValueAtTime(0,st+dur);
  o.connect(g);g.connect(masterGain);o.start(st);o.stop(st+dur+0.01);
  scheduledNodes.push(o,g);
}
function makeDrum(st,kick){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*.08),audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const g=audioCtx.createGain();const f=audioCtx.createBiquadFilter();
  f.type=kick?'lowpass':'highpass';f.frequency.value=kick?200:3000;
  g.gain.setValueAtTime(kick?.45:.16,st);g.gain.exponentialRampToValueAtTime(0.001,st+.08);
  src.connect(f);f.connect(g);g.connect(masterGain);src.start(st);src.stop(st+.1);
  scheduledNodes.push(src,g);
}
function scheduleLoop(){
  if(!audioCtx)return;
  const BPM=168,BEAT=60/BPM,STEP=BEAT/4;
  const startT=audioCtx.currentTime+0.1;
  let t=startT;
  for(const n of MELODY){const f=NOTE[n.n]||0,dur=n.d*BEAT*4;if(f)makeOsc(f*2,'square',t,dur*.85,.16);t+=dur;}
  const loopLen=t-startT;
  t=startT;
  for(const n of BASS){const f=NOTE[n.n]||0,dur=n.d*BEAT*4;if(f)makeOsc(f,'triangle',t,dur*.7,.2);t+=dur;}
  const reps=Math.ceil(loopLen/(STEP*DRUM.length));
  for(let r=0;r<reps;r++)for(let s=0;s<DRUM.length;s++){const dt=startT+r*STEP*DRUM.length+s*STEP;if(dt>=startT+loopLen)break;if(DRUM[s])makeDrum(dt,s===0||s===4||s===8||s===12);}
  loopTimer=setTimeout(()=>{scheduledNodes.forEach(n=>{try{n.disconnect();}catch(e){}});scheduledNodes=[];scheduleLoop();},(loopLen-.5)*1000);
}
function toggleMuteUI(){
  isMuted=!isMuted;
  if(masterGain&&audioCtx)masterGain.gain.setTargetAtTime(isMuted?0:.5,audioCtx.currentTime,.1);
  const btn=document.getElementById('mute-btn');
  btn.innerText=isMuted?'🔇':'🔊';
  document.getElementById('vol-disp').innerText=isMuted?'♪ OFF':'♪ ON';
}
function unlockAudio(){startMusic();document.removeEventListener('touchstart',unlockAudio);document.removeEventListener('click',unlockAudio);}
document.addEventListener('DOMContentLoaded',()=>{try{startMusic();}catch(e){}});
document.addEventListener('touchstart',unlockAudio,{once:true});
document.addEventListener('click',unlockAudio,{once:true});

   Init
════════════════════════════════ */
applyLang();
addGreeting();
</script>
